name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Настройка Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          # Полная установка ultralytics пропущена для скорости CI;
          # в реальном проекте раскомментируй:
          # pip install -r requirements.txt

      - name: Линтинг (ruff)
        run: ruff check src/ || echo "Ruff warnings (non-blocking)"

      - name: Проверка синтаксиса всех .py файлов
        run: |
          find src -name "*.py" -exec python -m py_compile {} +
          echo "Все файлы скомпилированы без ошибок"

      - name: Проверка импортов
        run: |
          python -c "import ast, sys; [ast.parse(open(f).read()) for f in __import__('glob').glob('src/**/*.py', recursive=True)]"
          echo "AST-парсинг всех модулей выполнен успешно"
